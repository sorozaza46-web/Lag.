Name: Build Game Lag Switch Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4
      with:
        # Kodları belirttiğiniz temiz klasöre indiriyoruz
        path: 'proje_kodlari'

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Python'ın bağımlılıkları doğru klasör için önbelleğe almasını sağlıyoruz
        cache: 'pip'
        cache-dependency-path: 'proje_kodlari/requirements.txt' # Eğer varsa, yoksa bu satırı silebilirsiniz

    - name: Bağımlılıkları Yükle
      # run altındaki her satırın bu klasörde çalışması için shell ve working-directory senkronize edildi
      defaults:
        run:
          working-directory: 'proje_kodlari'
      run: |
        python -m pip install --upgrade pip
        pip install pydivert psutil keyboard pyinstaller

    - name: PyInstaller ile EXE'ye Dönüştür
      run: |
        cd proje_kodlari
        pyinstaller --noconsole --onefile --uac-admin main.py

    - name: Hazır EXE Dosyasını GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Lag-Switch-Windows-Exe
        # GitHub Artifact yükleyicisi workspace kök dizininden başlar, yol doğrudur
        path: proje_kodlari/dist/main.exe
        
