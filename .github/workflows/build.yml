name: Build Game Lag Switch Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4
      with:
        # Kodları nokta içermeyen temiz bir klasöre indiriyoruz
        path: 'proje_kodlari'

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      # Kodlar 'proje_kodlari' içine indiği için terminali o klasöre yönlendiriyoruz
      working-directory: 'proje_kodlari'
      run: |
        python -m pip install --upgrade pip
        pip install pydivert psutil keyboard pyinstaller

    - name: PyInstaller ile EXE'ye Dönüştür
      # Aynı şekilde derleme işlemini de bu klasörün içinde yapıyoruz
      working-directory: 'proje_kodlari'
      run: |
        pyinstaller --noconsole --onefile --uac-admin main.py

    - name: Hazır EXE Dosyasını GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Lag-Switch-Windows-Exe
        # Çıkan .exe dosyasının yerini yeni klasör yapısına göre güncelledik
        path: proje_kodlari/dist/main.exe
        
